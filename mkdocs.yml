site_name: django-pydantic
site_description: Skip the serializer. Validate Django requests with Pydantic models — one line, zero boilerplate.
site_url: https://django-pydantic.readthedocs.io

docs_dir: docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
  features:
    - content.code.annotate
    - content.code.copy
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

repo_name: NEFORCEO/django-pydantic
repo_url: https://github.com/NEFORCEO/django-pydantic

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - English:
    - Overview: en/index.md
    - Tutorial:
      - en/tutorial/index.md
      - First Steps: en/tutorial/first-steps.md
      - Request Schema: en/tutorial/request-schema.md
      - Request Data Sources: en/tutorial/request-data.md
      - Validation Errors: en/tutorial/validation.md
      - URL Parameters: en/tutorial/url-params.md
      - Response Schema: en/tutorial/response-schema.md
      - Pydantic Features: en/tutorial/pydantic-features.md
    - Advanced User Guide:
      - en/advanced/index.md
      - Class-Based Views: en/advanced/class-based-views.md
      - Custom Data Extraction: en/advanced/custom-extraction.md
    - API Reference:
      - en/reference/index.md
      - RequestModel: en/reference/request-model.md
  - Русский:
    - Обзор: ru/index.md
    - Туториал:
      - ru/tutorial/index.md
      - Первые шаги: ru/tutorial/first-steps.md
      - Схема запроса: ru/tutorial/request-schema.md
      - Источники данных: ru/tutorial/request-data.md
      - Ошибки валидации: ru/tutorial/validation.md
      - Параметры URL: ru/tutorial/url-params.md
      - Схема ответа: ru/tutorial/response-schema.md
      - Возможности Pydantic: ru/tutorial/pydantic-features.md
    - Продвинутое использование:
      - ru/advanced/index.md
      - Вьюхи на классах: ru/advanced/class-based-views.md
      - Своя обработка данных: ru/advanced/custom-extraction.md
    - API Справочник:
      - ru/reference/index.md
      - RequestModel: ru/reference/request-model.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NEFORCEO/django-pydantic
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/django-pydantic/
  alternate:
    - link: /en/
      name: en - English
      lang: en
    - link: /ru/
      name: ru - Русский
      lang: ru
