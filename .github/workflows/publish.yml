name: CI / Publish

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build wheel and sdist
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish ──────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: write   # create tags + GitHub releases
      id-token: write   # PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to check existing tags

      - name: Read version from pyproject.toml
        id: ver
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"          >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG not found — will publish."
          fi

      - name: Download dist artifact
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create and push Git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: dist/*
          generate_release_notes: true

      # Option A — Trusted Publishing (OIDC, no secret needed).
      # Configure on PyPI: Account → Publishing → Add publisher:
      #   owner: NEFORCEO  repo: django-pydantic  workflow: publish.yml
      - name: Publish to PyPI (trusted publishing)
        if: steps.tag_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

      # Option B — API token (comment out Option A and uncomment below).
      # Add PYPI_API_TOKEN to repo Settings → Secrets → Actions.
      # - name: Publish to PyPI (token)
      #   if: steps.tag_check.outputs.exists == 'false'
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     password: ${{ secrets.PYPI_API_TOKEN }}
